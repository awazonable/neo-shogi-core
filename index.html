<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo将棋 PoC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--panel:#1a1a2e;--board:#d4a853;--board-dark:#c49a43;
  --border:#5c3317;--piece-bg:#faf8f0;--piece-border:#c0a870;
  --black-text:#1a1a1a;--promoted:#cc2200;
  --sel:#4caf50;--legal:#2196f3;--hover:#ffffff33;
  --text:#cdd6f4;--subtext:#a6adc8;--accent:#cba6f7;
}
body{
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:16px;gap:12px;
}
h1{font-size:28px;letter-spacing:.2em;color:var(--accent);text-shadow:0 0 20px #cba6f755}
#status{
  font-size:16px;padding:6px 24px;border-radius:20px;
  background:var(--panel);border:1px solid #ffffff22;color:var(--text);
  min-width:220px;text-align:center;letter-spacing:.05em;
}
.game-wrap{display:flex;align-items:flex-start;gap:16px}
/* ── HAND ───────────────────────────────── */
.hand{
  width:110px;background:var(--panel);border:1px solid #ffffff18;
  border-radius:10px;padding:10px 8px;min-height:200px;
}
.hand-label{font-size:11px;color:var(--subtext);margin-bottom:8px;text-align:center;letter-spacing:.1em}
.hand-pieces{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.hp{
  display:flex;align-items:center;gap:2px;padding:3px 6px;
  border-radius:6px;cursor:pointer;transition:background .15s;
  border:1px solid transparent;
}
.hp:hover{background:#ffffff12}
.hp.sel{background:#4caf5033;border-color:var(--sel)}
.hp-k{font-size:20px;line-height:1;color:var(--black-text)}
.hp-k.white{transform:rotate(180deg);display:inline-block}
.hp-n{font-size:11px;color:var(--subtext)}
.no-pieces{font-size:12px;color:var(--subtext);text-align:center;padding:8px 0}
/* ── BOARD ──────────────────────────────── */
.board-outer{display:flex;flex-direction:column;align-items:center;gap:4px}
.col-labels{display:flex;padding:0 0 0 18px}
.col-label{width:60px;text-align:center;font-size:12px;color:var(--subtext)}
.board-row-wrap{display:flex;align-items:stretch}
.row-labels{display:flex;flex-direction:column;padding-top:0}
.row-label{height:60px;width:18px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--subtext)}
#board{
  display:grid;grid-template-columns:repeat(9,60px);grid-template-rows:repeat(9,60px);
  background:var(--board);border:3px solid var(--border);
  box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 0 40px rgba(0,0,0,.1);
}
.cell{
  width:60px;height:60px;border:1px solid rgba(92,51,23,.35);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background-color .1s;position:relative;
}
.cell:hover{background:var(--hover)}
.cell.sel{background:rgba(76,175,80,.55)}
.cell.sel:hover{background:rgba(76,175,80,.75)}
.cell.legal{background:rgba(33,150,243,.42)}
.cell.legal:hover{background:rgba(33,150,243,.72)}
.cell.last-from{background:rgba(255,200,50,.25)}
.cell.last-to{background:rgba(255,200,50,.4)}
/* ── PIECE ──────────────────────────────── */
.piece{
  width:52px;height:52px;background:var(--piece-bg);
  border:1px solid var(--piece-border);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;color:var(--black-text);
  box-shadow:1px 2px 3px rgba(0,0,0,.35);
  pointer-events:none;user-select:none;
  clip-path:polygon(50% 0%,97% 18%,100% 100%,0% 100%,3% 18%);
  transition:filter .1s;
}
.piece.white{transform:rotate(180deg)}
.piece.promo{color:var(--promoted)}
.cell.sel .piece,.cell:hover .piece{filter:brightness(1.1)}
/* ── CONTROLS ───────────────────────────── */
.controls{display:flex;gap:10px;align-items:center}
button{
  padding:8px 20px;border-radius:8px;border:1px solid #ffffff33;
  background:#2a2a4e;color:var(--text);cursor:pointer;font-size:14px;
  transition:background .15s;letter-spacing:.05em;
}
button:hover{background:#3a3a6e}
/* ── PROMO DIALOG ───────────────────────── */
#overlay{display:none;position:fixed;inset:0;background:#00000088;z-index:98}
#promo-dialog{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#1e1e3e;border:2px solid var(--accent);border-radius:12px;
  padding:28px 36px;text-align:center;z-index:99;min-width:240px;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
}
#promo-dialog p{font-size:18px;margin-bottom:20px;color:var(--text)}
#promo-dialog .preview{font-size:40px;margin-bottom:16px;display:flex;justify-content:center;gap:20px}
#promo-dialog .preview span{
  padding:8px 12px;background:var(--piece-bg);border-radius:4px;
  color:var(--black-text);border:1px solid var(--piece-border);
  clip-path:polygon(50% 0%,97% 18%,100% 100%,0% 100%,3% 18%);
  width:56px;height:56px;display:flex;align-items:center;justify-content:center;
}
#promo-dialog .preview .p-promo{color:var(--promoted)}
#promo-dialog .btns{display:flex;gap:12px;justify-content:center}
#promo-dialog .btns button{min-width:90px;font-size:15px}
/* ── WINNER ─────────────────────────────── */
#winner-overlay{
  display:none;position:fixed;inset:0;background:#00000099;z-index:200;
  align-items:center;justify-content:center;flex-direction:column;gap:24px;
}
#winner-overlay.show{display:flex}
#winner-box{
  background:#1e1e3e;border:2px solid var(--accent);border-radius:16px;
  padding:40px 56px;text-align:center;
  box-shadow:0 20px 80px rgba(0,0,0,.9);
}
#winner-box h2{font-size:32px;color:var(--accent);margin-bottom:12px}
#winner-box p{font-size:18px;color:var(--text);margin-bottom:24px}
</style>
</head>
<body>
<h1>Neo将棋</h1>
<div id="status">先手(黒)のターン</div>

<div class="game-wrap">
  <!-- White hand (top left) -->
  <div class="hand" id="white-hand">
    <div class="hand-label">後手(白)　持ち駒</div>
    <div class="hand-pieces" id="white-pieces"></div>
  </div>

  <!-- Board -->
  <div class="board-outer">
    <div class="col-labels" id="col-labels"></div>
    <div class="board-row-wrap">
      <div id="board"></div>
      <div class="row-labels" id="row-labels"></div>
    </div>
  </div>

  <!-- Black hand (bottom right) -->
  <div class="hand" id="black-hand">
    <div class="hand-label">先手(黒)　持ち駒</div>
    <div class="hand-pieces" id="black-pieces"></div>
  </div>
</div>

<div class="controls">
  <button onclick="startNewGame()">新しいゲーム</button>
  <button onclick="toggleAI()">AI: <span id="ai-toggle-label">ON</span></button>
</div>

<!-- Promotion dialog -->
<div id="overlay"></div>
<div id="promo-dialog">
  <p>成りますか？</p>
  <div class="preview">
    <span id="p-before"></span>
    <span class="p-promo" id="p-after"></span>
  </div>
  <div class="btns">
    <button id="btn-promo-yes">成る</button>
    <button id="btn-promo-no">成らない</button>
  </div>
</div>

<!-- Winner overlay -->
<div id="winner-overlay">
  <div id="winner-box">
    <h2 id="winner-title"></h2>
    <p id="winner-msg"></p>
    <button onclick="startNewGame()">もう一度</button>
  </div>
</div>

<script>
'use strict';
// =====================================================================
// UTILITIES
// =====================================================================
let _uid = 0;
const uid = () => `t${++_uid}`;
const opp = p => p === 'black' ? 'white' : 'black';
const inB = (r, c) => r >= 0 && r < 9 && c >= 0 && c < 9;
const tokAt = (board, r, c) => inB(r, c) ? board[r][c].token : null;

function deepClone(o) {
  // Fast structured clone for our state
  return JSON.parse(JSON.stringify(o));
}

// =====================================================================
// PIECE DEFINITIONS
// =====================================================================
const KANJI = {
  K_b:'王', K_w:'玉', K:'王',
  R:'飛', B:'角', G:'金', S:'銀', N:'桂', L:'香', P:'歩',
  '+R':'龍', '+B':'馬', '+S':'全', '+N':'圭', '+L':'杏', '+P':'と',
};

function pieceKanji(token) {
  if (token.type === 'K') return token.owner === 'black' ? KANJI.K_b : KANJI.K_w;
  return KANJI[token.type] || token.type;
}

const PIECE_TAGS = {
  K:['royal','king'], R:['rook','major'], B:['bishop','major'],
  G:['gold'], S:['silver'], N:['knight'], L:['lance'], P:['pawn'],
};

function makeToken(type, owner) {
  const base = type.replace('+', '');
  const isP = type.startsWith('+');
  return {
    id: uid(), owner, type,
    tags: ['piece', ...(isP ? ['promoted'] : []), ...(PIECE_TAGS[base] || [])],
    attrs: {}
  };
}

const CAN_PROMOTE = new Set(['R','B','S','N','L','P']);

function promoType(t) {
  return {R:'+R',B:'+B',S:'+S',N:'+N',L:'+L',P:'+P'}[t] || t;
}

function demoteType(t) {
  return t.replace('+', '');
}

function inPromoZone(row, player) {
  return player === 'black' ? row <= 2 : row >= 6;
}

function mustPromo(type, row, player) {
  // Pieces that would have no legal moves if not promoted
  if (player === 'black') {
    if (type === 'P' || type === 'L') return row === 0;
    if (type === 'N') return row <= 1;
  } else {
    if (type === 'P' || type === 'L') return row === 8;
    if (type === 'N') return row >= 7;
  }
  return false;
}

// =====================================================================
// MOVE GENERATION
// =====================================================================
function getMoves(token, fr, fc, board) {
  const f = token.owner === 'black' ? -1 : 1;
  // Directions relative to player orientation
  const D = {
    F: {dr:f,dc:0}, B:{dr:-f,dc:0},
    L:{dr:0,dc:-1}, R:{dr:0,dc:1},
    FL:{dr:f,dc:-1}, FR:{dr:f,dc:1},
    BL:{dr:-f,dc:-1}, BR:{dr:-f,dc:1},
  };
  const moves = [];

  function slide(dir, max=8) {
    let r=fr+dir.dr, c=fc+dir.dc, n=0;
    while (inB(r,c) && n<max) {
      const t = tokAt(board,r,c);
      if (t) { if (t.owner !== token.owner) moves.push({row:r,col:c}); break; }
      moves.push({row:r,col:c});
      r+=dir.dr; c+=dir.dc; n++;
    }
  }

  function jump(dr, dc) {
    const r=fr+dr, c=fc+dc;
    if (inB(r,c)) {
      const t = tokAt(board,r,c);
      if (!t || t.owner !== token.owner) moves.push({row:r,col:c});
    }
  }

  const G = [D.F,D.FL,D.FR,D.L,D.R,D.B];

  switch(token.type) {
    case 'K':
      [D.F,D.B,D.L,D.R,D.FL,D.FR,D.BL,D.BR].forEach(d=>jump(d.dr,d.dc)); break;
    case 'R': [D.F,D.B,D.L,D.R].forEach(d=>slide(d)); break;
    case 'B': [D.FL,D.FR,D.BL,D.BR].forEach(d=>slide(d)); break;
    case 'G': G.forEach(d=>jump(d.dr,d.dc)); break;
    case 'S': [D.F,D.FL,D.FR,D.BL,D.BR].forEach(d=>jump(d.dr,d.dc)); break;
    case 'N': jump(f*2,-1); jump(f*2,1); break;
    case 'L': slide(D.F); break;
    case 'P': jump(D.F.dr, D.F.dc); break;
    case '+R': [D.F,D.B,D.L,D.R].forEach(d=>slide(d));
               [D.FL,D.FR,D.BL,D.BR].forEach(d=>jump(d.dr,d.dc)); break;
    case '+B': [D.FL,D.FR,D.BL,D.BR].forEach(d=>slide(d));
               [D.F,D.B,D.L,D.R].forEach(d=>jump(d.dr,d.dc)); break;
    case '+G': case '+S': case '+N': case '+L': case '+P':
      G.forEach(d=>jump(d.dr,d.dc)); break;
  }
  return moves;
}

// =====================================================================
// GAME STATE
// =====================================================================
function makeBoard() {
  return Array.from({length:9},(_,r)=>
    Array.from({length:9},(_,c)=>({coord:{row:r,col:c},token:null,attrs:{}}))
  );
}

function makeState() {
  return {
    board: makeBoard(),
    hands: {black:[],white:[]},
    zones: {black:{},white:{}},
    turn: 'black',
    moveCount: 0,
    history: [],
    rng: {seed:42,cursor:0},
    global: {}
  };
}

// =====================================================================
// NEO将棋 ENGINE (Core Layer)
// =====================================================================
class NeoShogiEngine {
  constructor() { this.plugins = []; this.state = null; }

  use(plugin) {
    this.plugins.push(plugin);
    this.plugins.sort((a,b)=>(a.priority||0)-(b.priority||0));
    return this;
  }

  init() {
    this.state = makeState();
    for (const p of this.plugins) {
      if (p.hooks?.on_game_init) {
        try { this.state = p.hooks.on_game_init(this.state) || this.state; }
        catch(e) { console.error(`[${p.id}] on_game_init:`, e); }
      }
    }
    return this;
  }

  getLegalActions() {
    let actions = [];
    for (const p of this.plugins) {
      if (p.hooks?.get_actions) {
        try { actions = p.hooks.get_actions(actions, this.state) || actions; }
        catch(e) { console.error(`[${p.id}] get_actions:`, e); }
      }
    }
    return actions.filter(action =>
      this.plugins.every(p => {
        if (!p.hooks?.validate_action) return true;
        try { return p.hooks.validate_action(action, this.state) !== false; }
        catch(e) { return true; }
      })
    );
  }

  step(action) {
    // before_action
    let skip = false;
    for (const p of this.plugins) {
      if (p.hooks?.before_action) {
        try {
          const r = p.hooks.before_action(action, this.state);
          if (r?.skip) { skip=true; if(r.state) this.state=r.state; break; }
          if (r?.state) this.state = r.state;
        } catch(e) {}
      }
    }

    // apply_action (first plugin that handles it wins)
    if (!skip) {
      for (const p of this.plugins) {
        if (p.hooks?.apply_action) {
          try {
            const r = p.hooks.apply_action(action, this.state);
            if (r) { this.state = r; break; }
          } catch(e) { console.error(`[${p.id}] apply_action:`, e); }
        }
      }
    }

    // after_action
    for (const p of this.plugins) {
      if (p.hooks?.after_action) {
        try { this.state = p.hooks.after_action(action, this.state) || this.state; }
        catch(e) {}
      }
    }

    // on_turn_end
    for (const p of this.plugins) {
      if (p.hooks?.on_turn_end) {
        try { this.state = p.hooks.on_turn_end(this.state) || this.state; }
        catch(e) {}
      }
    }

    // Turn change
    if (!this.state.global.skipTurnChange) {
      this.state = {
        ...this.state,
        turn: opp(this.state.turn),
        moveCount: this.state.moveCount + 1,
      };
    }
    const g = {...this.state.global};
    delete g.skipTurnChange;
    this.state = {...this.state, global:g};

    // on_turn_start
    for (const p of this.plugins) {
      if (p.hooks?.on_turn_start) {
        try { this.state = p.hooks.on_turn_start(this.state) || this.state; }
        catch(e) {}
      }
    }

    return this.checkEnd();
  }

  checkEnd() {
    for (const p of this.plugins) {
      if (p.hooks?.check_end) {
        try {
          const r = p.hooks.check_end(this.state);
          if (r != null) return r;
        } catch(e) {}
      }
    }
    return null;
  }
}

// =====================================================================
// STANDARD SHOGI PLUGIN (Plugin Layer)
// =====================================================================
const INIT_SETUP = [
  // White (top, rows 0-2)
  {r:0,c:0,t:'L',o:'white'},{r:0,c:1,t:'N',o:'white'},{r:0,c:2,t:'S',o:'white'},
  {r:0,c:3,t:'G',o:'white'},{r:0,c:4,t:'K',o:'white'},{r:0,c:5,t:'G',o:'white'},
  {r:0,c:6,t:'S',o:'white'},{r:0,c:7,t:'N',o:'white'},{r:0,c:8,t:'L',o:'white'},
  {r:1,c:1,t:'R',o:'white'},{r:1,c:7,t:'B',o:'white'},
  ...Array.from({length:9},(_,c)=>({r:2,c,t:'P',o:'white'})),
  // Black (bottom, rows 6-8)
  ...Array.from({length:9},(_,c)=>({r:6,c,t:'P',o:'black'})),
  {r:7,c:1,t:'B',o:'black'},{r:7,c:7,t:'R',o:'black'},
  {r:8,c:0,t:'L',o:'black'},{r:8,c:1,t:'N',o:'black'},{r:8,c:2,t:'S',o:'black'},
  {r:8,c:3,t:'G',o:'black'},{r:8,c:4,t:'K',o:'black'},{r:8,c:5,t:'G',o:'black'},
  {r:8,c:6,t:'S',o:'black'},{r:8,c:7,t:'N',o:'black'},{r:8,c:8,t:'L',o:'black'},
];

function hasPawnInCol(board, col, player) {
  for (let r=0; r<9; r++) {
    const t = board[r][col].token;
    if (t && t.owner===player && t.type==='P') return true;
  }
  return false;
}

function badDropRank(type, row, player) {
  if (player==='black') {
    if (type==='P'||type==='L') return row===0;
    if (type==='N') return row<=1;
  } else {
    if (type==='P'||type==='L') return row===8;
    if (type==='N') return row>=7;
  }
  return false;
}

const StandardShogiPlugin = {
  id: 'standard_shogi',
  priority: -100,

  hooks: {
    on_game_init(state) {
      const s = deepClone(state);
      for (const {r,c,t,o} of INIT_SETUP)
        s.board[r][c].token = makeToken(t, o);
      return s;
    },

    get_actions(actions, state) {
      const player = state.turn;
      const out = [];

      // --- Board moves ---
      for (let r=0; r<9; r++) {
        for (let c=0; c<9; c++) {
          const token = state.board[r][c].token;
          if (!token || token.owner !== player) continue;
          const dests = getMoves(token, r, c, state.board);
          for (const {row, col} of dests) {
            const inPZ = inPromoZone(r, player) || inPromoZone(row, player);
            const cp   = CAN_PROMOTE.has(token.type) && inPZ;
            const mp   = mustPromo(token.type, row, player);
            if (cp && !mp) {
              // Offer both choices
              out.push({player,tag:'move',payload:{from:{row:r,col:c},to:{row,col},promote:false}});
              out.push({player,tag:'move',payload:{from:{row:r,col:c},to:{row,col},promote:true}});
            } else {
              out.push({player,tag:'move',payload:{from:{row:r,col:c},to:{row,col},promote:mp}});
            }
          }
        }
      }

      // --- Drop moves ---
      const seen = new Set();
      for (const token of state.hands[player]) {
        if (seen.has(token.type)) continue;
        seen.add(token.type);
        for (let r=0; r<9; r++) {
          for (let c=0; c<9; c++) {
            if (state.board[r][c].token) continue;
            if (badDropRank(token.type, r, player)) continue;
            if (token.type==='P' && hasPawnInCol(state.board, c, player)) continue;
            out.push({player,tag:'drop',payload:{type:token.type,to:{row:r,col:c}}});
          }
        }
      }

      return [...actions, ...out];
    },

    apply_action(action, state) {
      if (action.tag === 'move') {
        const {from,to,promote} = action.payload;
        const s = deepClone(state);
        let token = {...s.board[from.row][from.col].token};
        const target = s.board[to.row][to.col].token;

        if (target) {
          // Captured → demoted, goes to attacker's hand
          s.hands[action.player].push(makeToken(demoteType(target.type), action.player));
        }

        s.board[from.row][from.col].token = null;

        if (promote) {
          token.type = promoType(token.type);
          const base = token.type.replace('+','');
          token.tags = ['piece','promoted',...(PIECE_TAGS[base]||[])];
        }
        s.board[to.row][to.col].token = token;

        // Record last move for highlighting
        s.global.lastMove = {from, to};
        return s;
      }

      if (action.tag === 'drop') {
        const {type, to} = action.payload;
        const s = deepClone(state);
        const idx = s.hands[action.player].findIndex(t => t.type===type);
        if (idx === -1) return null;
        const [token] = s.hands[action.player].splice(idx, 1);
        s.board[to.row][to.col].token = {...token};
        s.global.lastMove = {from:null, to};
        return s;
      }
      return null;
    },

    check_end(state) {
      let bk=false, wk=false;
      for (let r=0; r<9; r++) for (let c=0; c<9; c++) {
        const t = state.board[r][c].token;
        if (t?.type==='K') { if(t.owner==='black') bk=true; else wk=true; }
      }
      if (!bk) return 'white';
      if (!wk) return 'black';
      return null;
    },
  }
};

// =====================================================================
// RANDOM AI PLUGIN (Plugin Layer)
// =====================================================================
const RandomAIPlugin = {
  id: 'random_ai',
  priority: 100,
  hooks: {}, // AI is called externally by UI
};

function aiChooseAction(engine) {
  const actions = engine.getLegalActions();
  if (!actions.length) return null;
  // Slightly smarter: prefer captures
  const captures = actions.filter(a =>
    a.tag==='move' && engine.state.board[a.payload.to.row][a.payload.to.col].token
  );
  const pool = captures.length > 0 && Math.random() < 0.6 ? captures : actions;
  return pool[Math.floor(Math.random() * pool.length)];
}

// =====================================================================
// UI STATE
// =====================================================================
let engine = null;
let selectedCell = null; // {type:'board',row,col} | {type:'hand',player,pieceType}
let legalActions = [];
let legalDests = new Set();
let lastMove = null;
let gameOver = false;
let isAITurn = false;
let aiEnabled = true;

// =====================================================================
// UI RENDERING
// =====================================================================
const COL_KANJI = ['9','8','7','6','5','4','3','2','1'];
const ROW_KANJI = ['一','二','三','四','五','六','七','八','九'];

function buildLabels() {
  const colEl = document.getElementById('col-labels');
  colEl.innerHTML = '';
  COL_KANJI.forEach(n => {
    const d = document.createElement('div');
    d.className = 'col-label';
    d.textContent = n;
    colEl.appendChild(d);
  });
  const rowEl = document.getElementById('row-labels');
  rowEl.innerHTML = '';
  ROW_KANJI.forEach(n => {
    const d = document.createElement('div');
    d.className = 'row-label';
    d.textContent = n;
    rowEl.appendChild(d);
  });
}

function renderAll() {
  renderBoard();
  renderHands();
  renderStatus();
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  const state = engine.state;
  const lm = state.global.lastMove;

  for (let r=0; r<9; r++) {
    for (let c=0; c<9; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      const isSelBoard = selectedCell?.type==='board' && selectedCell.row===r && selectedCell.col===c;
      const isLegal = legalDests.has(`${r},${c}`);
      const isLastFrom = lm?.from && lm.from.row===r && lm.from.col===c;
      const isLastTo = lm?.to && lm.to.row===r && lm.to.col===c;

      if (isSelBoard) cell.classList.add('sel');
      else if (isLegal) cell.classList.add('legal');
      else if (isLastFrom) cell.classList.add('last-from');
      else if (isLastTo) cell.classList.add('last-to');

      const token = state.board[r][c].token;
      if (token) {
        const piece = document.createElement('div');
        piece.className = 'piece' +
          (token.owner==='white' ? ' white' : '') +
          (token.type.startsWith('+') ? ' promo' : '');
        piece.textContent = pieceKanji(token);
        cell.appendChild(piece);
      }

      cell.addEventListener('click', () => handleCellClick(r, c));
      boardEl.appendChild(cell);
    }
  }
}

function renderHands() {
  renderHand('white');
  renderHand('black');
}

function renderHand(player) {
  const el = document.getElementById(player + '-pieces');
  el.innerHTML = '';
  const hand = engine.state.hands[player];
  const counts = {};
  for (const t of hand) counts[t.type] = (counts[t.type]||0) + 1;
  const entries = Object.entries(counts);

  if (!entries.length) {
    el.innerHTML = '<div class="no-pieces">なし</div>';
    return;
  }

  for (const [type, count] of entries) {
    const div = document.createElement('div');
    div.className = 'hp';
    const isSel = selectedCell?.type==='hand' && selectedCell.player===player && selectedCell.pieceType===type;
    if (isSel) div.classList.add('sel');

    const kEl = document.createElement('span');
    kEl.className = 'hp-k' + (player==='white' ? ' white' : '');
    kEl.textContent = KANJI[type] || type;
    div.appendChild(kEl);

    if (count > 1) {
      const nEl = document.createElement('span');
      nEl.className = 'hp-n';
      nEl.textContent = `×${count}`;
      div.appendChild(nEl);
    }

    div.addEventListener('click', () => handleHandClick(player, type));
    el.appendChild(div);
  }
}

function renderStatus() {
  const el = document.getElementById('status');
  if (gameOver) {
    el.textContent = gameOver==='black' ? '先手(黒)の勝ち！' : '後手(白)の勝ち！';
    return;
  }
  if (isAITurn) { el.textContent = 'AIが考えています…'; return; }
  el.textContent = engine.state.turn==='black' ? '先手(黒)のターン' : '後手(白)のターン (AI)';
}

// =====================================================================
// UI EVENTS
// =====================================================================
function clearSel() {
  selectedCell = null;
  legalActions = [];
  legalDests = new Set();
}

function handleCellClick(row, col) {
  if (gameOver || isAITurn) return;
  const state = engine.state;

  // If a selection exists and this cell is a legal destination
  if (selectedCell && legalDests.has(`${row},${col}`)) {
    if (selectedCell.type === 'hand') {
      // Drop
      const a = legalActions.find(a =>
        a.tag==='drop' && a.payload.to.row===row && a.payload.to.col===col
      );
      if (a) executeAction(a);
    } else {
      // Board move — may need promotion choice
      const matches = legalActions.filter(a =>
        a.tag==='move' && a.payload.to.row===row && a.payload.to.col===col
      );
      if (!matches.length) return;
      if (matches.length === 1) {
        executeAction(matches[0]);
      } else {
        // Both promote=true and promote=false exist
        const wp = matches.find(a=>a.payload.promote);
        const np = matches.find(a=>!a.payload.promote);
        if (wp && np) showPromoDialog(wp, np);
        else executeAction(matches[0]);
      }
    }
    return;
  }

  // Select this player's piece
  const token = state.board[row][col].token;
  if (token && token.owner === state.turn) {
    clearSel();
    const all = engine.getLegalActions();
    legalActions = all.filter(a =>
      a.tag==='move' && a.payload.from.row===row && a.payload.from.col===col
    );
    legalDests = new Set(legalActions.map(a=>`${a.payload.to.row},${a.payload.to.col}`));
    selectedCell = {type:'board', row, col};
    renderAll();
    return;
  }

  clearSel();
  renderAll();
}

function handleHandClick(player, pieceType) {
  if (gameOver || isAITurn) return;
  if (player !== engine.state.turn) return;

  if (selectedCell?.type==='hand' && selectedCell.player===player && selectedCell.pieceType===pieceType) {
    clearSel();
    renderAll();
    return;
  }

  clearSel();
  const all = engine.getLegalActions();
  legalActions = all.filter(a => a.tag==='drop' && a.payload.type===pieceType);
  legalDests = new Set(legalActions.map(a=>`${a.payload.to.row},${a.payload.to.col}`));
  selectedCell = {type:'hand', player, pieceType};
  renderAll();
}

function executeAction(action) {
  clearSel();
  const result = engine.step(action);
  if (result) {
    gameOver = result;
    renderAll();
    showWinner(result);
    return;
  }
  renderAll();

  // Trigger AI if it's white's turn
  if (aiEnabled && engine.state.turn === 'white' && !gameOver) {
    isAITurn = true;
    renderStatus();
    setTimeout(doAITurn, 400 + Math.random() * 300);
  }
}

function doAITurn() {
  const action = aiChooseAction(engine);
  isAITurn = false;
  if (!action) {
    // White has no moves → black wins
    gameOver = 'black';
    renderAll();
    showWinner('black');
    return;
  }
  const result = engine.step(action);
  if (result) {
    gameOver = result;
    renderAll();
    showWinner(result);
    return;
  }
  renderAll();
}

// =====================================================================
// PROMOTION DIALOG
// =====================================================================
function showPromoDialog(withP, withoutP) {
  const type = withoutP.payload.from
    ? engine.state.board[withoutP.payload.from.row][withoutP.payload.from.col].token?.type
    : null;
  document.getElementById('p-before').textContent = type ? (KANJI[type]||type) : '?';
  const promoted = type ? (KANJI[promoType(type)]||promoType(type)) : '?';
  document.getElementById('p-after').textContent = promoted;

  document.getElementById('overlay').style.display = 'block';
  document.getElementById('promo-dialog').style.display = 'block';

  document.getElementById('btn-promo-yes').onclick = () => {
    hidePromoDialog();
    executeAction(withP);
  };
  document.getElementById('btn-promo-no').onclick = () => {
    hidePromoDialog();
    executeAction(withoutP);
  };
}

function hidePromoDialog() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('promo-dialog').style.display = 'none';
}

// =====================================================================
// WINNER OVERLAY
// =====================================================================
function showWinner(winner) {
  const titleEl = document.getElementById('winner-title');
  const msgEl = document.getElementById('winner-msg');
  titleEl.textContent = winner === 'black' ? '先手(黒)の勝ち！' : '後手(白)の勝ち！';
  msgEl.textContent = winner === 'black'
    ? '白の王将を詰めました'
    : 'AIが黒の王将を詰めました';
  document.getElementById('winner-overlay').classList.add('show');
}

function hideWinner() {
  document.getElementById('winner-overlay').classList.remove('show');
}

// =====================================================================
// CONTROLS
// =====================================================================
function toggleAI() {
  aiEnabled = !aiEnabled;
  document.getElementById('ai-toggle-label').textContent = aiEnabled ? 'ON' : 'OFF';
  // If it's white's turn and AI was just enabled
  if (aiEnabled && !gameOver && engine.state.turn === 'white') {
    isAITurn = true;
    renderStatus();
    setTimeout(doAITurn, 400);
  }
}

// =====================================================================
// INITIALIZATION
// =====================================================================
function startNewGame() {
  hideWinner();
  hidePromoDialog();
  clearSel();
  gameOver = false;
  isAITurn = false;
  _uid = 0;
  engine = new NeoShogiEngine();
  engine.use(StandardShogiPlugin);
  engine.use(RandomAIPlugin);
  engine.init();
  buildLabels();
  renderAll();
}

startNewGame();
</script>
