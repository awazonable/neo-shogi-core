<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo将棋 PoC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--panel:#1a1a2e;--board:#d4a853;
  --border:#5c3317;--piece-bg:#faf8f0;--piece-border:#c0a870;
  --black-text:#1a1a1a;--promoted:#cc2200;
  --sel:#4caf50;--legal:#2196f3;--hover:#ffffff33;
  --text:#cdd6f4;--subtext:#a6adc8;--accent:#cba6f7;
  --cell:min(60px,calc((100vw - 50px) / 9));
}
body{
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:16px;gap:12px;
  overflow-x:hidden;
}
h1{font-size:28px;letter-spacing:.2em;color:var(--accent);text-shadow:0 0 20px #cba6f755}
#status{
  font-size:16px;padding:6px 24px;border-radius:20px;
  background:var(--panel);border:1px solid #ffffff22;color:var(--text);
  min-width:260px;text-align:center;letter-spacing:.05em;
}
.game-wrap{display:flex;align-items:flex-start;gap:16px}
/* ── HAND ───────────────────────────────── */
.hand{
  width:110px;background:var(--panel);border:1px solid #ffffff18;
  border-radius:10px;padding:10px 8px;min-height:200px;
}
.hand-label{font-size:11px;color:var(--subtext);margin-bottom:8px;text-align:center;letter-spacing:.1em}
.hand-pieces{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.hp{
  display:flex;align-items:center;gap:2px;padding:3px 6px;
  border-radius:6px;cursor:pointer;transition:background .15s;
  border:1px solid transparent;
}
.hp:hover{background:#ffffff12}
.hp.sel{background:#4caf5033;border-color:var(--sel)}
.hp-n{font-size:11px;color:var(--subtext)}
/* 持ち駒の駒背景（盤上 .piece の小さい版） */
.piece.hp-piece{width:38px;height:38px;font-size:16px;cursor:pointer}
.no-pieces{font-size:12px;color:var(--subtext);text-align:center;padding:8px 0}
/* ── BOARD ──────────────────────────────── */
.board-outer{display:flex;flex-direction:column;align-items:center;gap:4px}
.col-labels{display:flex;padding:0 0 0 18px}
.col-label{width:var(--cell);text-align:center;font-size:12px;color:var(--subtext)}
.board-row-wrap{display:flex;align-items:stretch}
.row-labels{display:flex;flex-direction:column;padding-top:0}
.row-label{height:var(--cell);width:18px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--subtext)}
#board{
  display:grid;grid-template-columns:repeat(9,var(--cell));grid-template-rows:repeat(9,var(--cell));
  background:var(--board);border:3px solid var(--border);
  box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 0 40px rgba(0,0,0,.1);
}
.cell{
  width:var(--cell);height:var(--cell);border:1px solid rgba(92,51,23,.35);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background-color .1s;position:relative;
}
.cell:hover{background:var(--hover)}
.cell.sel{background:rgba(76,175,80,.55)}
.cell.sel:hover{background:rgba(76,175,80,.75)}
.cell.legal{background:rgba(33,150,243,.42)}
.cell.legal:hover{background:rgba(33,150,243,.72)}
.cell.last-from{background:rgba(255,160,20,.50)}
.cell.last-to{background:rgba(255,140,0,.72)}
/* ── PIECE ──────────────────────────────── */
.piece{
  width:calc(var(--cell)*.867);height:calc(var(--cell)*.867);background:var(--piece-bg);
  border:1px solid var(--piece-border);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:calc(var(--cell)*.367);font-weight:700;color:var(--black-text);
  box-shadow:1px 2px 3px rgba(0,0,0,.35);
  pointer-events:none;user-select:none;
  clip-path:polygon(50% 0%,97% 18%,100% 100%,0% 100%,3% 18%);
  transition:filter .1s;
}
.piece.white{transform:rotate(180deg)}
.piece.promo{color:var(--promoted)}
.cell.sel .piece,.cell:hover .piece{filter:brightness(1.1)}
/* ── CONTROLS ───────────────────────────── */
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
button{
  padding:8px 20px;border-radius:8px;border:1px solid #ffffff33;
  background:#2a2a4e;color:var(--text);cursor:pointer;font-size:14px;
  transition:background .15s;letter-spacing:.05em;
}
button:hover{background:#3a3a6e}
#btn-declare-double{background:#3a2a0e;border-color:#c8943a;color:#f0c060}
#btn-declare-double:hover{background:#5a3a1e}
/* ── MODALS (shared) ────────────────────── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:#00000088;z-index:98;
}
.modal-box{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#1e1e3e;border:2px solid var(--accent);border-radius:12px;
  padding:28px 36px;z-index:99;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
}
/* ── PROMO DIALOG ───────────────────────── */
#promo-dialog{text-align:center;min-width:240px}
#promo-dialog p{font-size:18px;margin-bottom:20px;color:var(--text)}
#promo-dialog .preview{font-size:40px;margin-bottom:16px;display:flex;justify-content:center;gap:20px}
#promo-dialog .preview span{
  padding:8px 12px;background:var(--piece-bg);border-radius:4px;
  color:var(--black-text);border:1px solid var(--piece-border);
  clip-path:polygon(50% 0%,97% 18%,100% 100%,0% 100%,3% 18%);
  width:56px;height:56px;display:flex;align-items:center;justify-content:center;
}
#promo-dialog .preview .p-promo{color:var(--promoted)}
#promo-dialog .btns{display:flex;gap:12px;justify-content:center}
#promo-dialog .btns button{min-width:90px;font-size:15px}
/* ── SETUP MODAL ────────────────────────── */
#setup-modal{min-width:320px;max-height:80vh;overflow-y:auto}
#setup-modal h2{font-size:20px;color:var(--accent);margin-bottom:18px;text-align:center;letter-spacing:.1em}
.setup-section{margin-bottom:14px}
.setup-label{font-size:10px;color:var(--subtext);letter-spacing:.12em;margin-bottom:6px;text-transform:uppercase;border-bottom:1px solid #ffffff15;padding-bottom:4px}
.setup-row{
  display:flex;align-items:flex-start;gap:10px;padding:5px 8px;
  border-radius:6px;cursor:pointer;transition:background .12s;
  border:1px solid transparent;margin-bottom:2px;
}
.setup-row:hover{background:#ffffff0a}
.setup-row input[type="checkbox"],.setup-row input[type="radio"]{
  margin-top:3px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;
}
.setup-row input[disabled]{opacity:.4;cursor:not-allowed}
.setup-row-text{display:flex;flex-direction:column}
.setup-row-name{font-size:13px;color:var(--text)}
.setup-desc{font-size:10px;color:var(--subtext);margin-top:1px}
#btn-start-game{
  width:100%;margin-top:10px;font-size:16px;padding:10px;
  background:var(--accent);color:#0f0f1a;border:none;font-weight:700;
  border-radius:8px;letter-spacing:.05em;
}
#btn-start-game:hover{background:#b892e0}
/* ── AI 思考中ブロック ──────────────────── */
/* CSS レベルで先行入力を防ぐ。JS の isAITurn ガードと二重防護。 */
body.ai-thinking .game-wrap,
body.ai-thinking .controls,
body.ai-thinking #replay-controls{pointer-events:none}
body.ai-thinking{cursor:wait}
body.ai-thinking .cell,body.ai-thinking .hp{cursor:wait}
/* ── 2文字駒名 ──────────────────────────── */
.piece.two-char{font-size:calc(var(--cell)*.28);letter-spacing:-1px}
/* ── 棋譜コントロール ───────────────────── */
#replay-controls{
  display:none;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;
  padding:6px 12px;background:var(--panel);border:1px solid #ffffff22;
  border-radius:20px;margin-top:4px;
}
#replay-controls.show{display:flex}
#replay-info{font-size:13px;color:var(--subtext);min-width:80px;text-align:center}
/* ── 評価グラフ ──────────────────────────── */
#eval-display{display:none;flex-direction:column;align-items:center;gap:4px;width:min(calc(100vw - 32px),500px)}
#eval-display.show{display:flex}
#eval-label{font-size:12px;color:var(--subtext);letter-spacing:.04em}
#eval-graph{width:100%;height:80px;border-radius:8px;border:1px solid #ffffff18;display:block}
/* ── SHRINK / SCORE ─────────────────────── */
.cell.shrunk{background:rgba(0,0,0,.55)!important;cursor:not-allowed;opacity:.45}
.cell.exploded{background:rgba(255,100,0,.5)!important}
#score-bar{
  font-size:13px;padding:4px 16px;border-radius:16px;
  background:var(--panel);border:1px solid #ffffff22;color:var(--subtext);
  letter-spacing:.04em;display:none;
}
/* ── MOBILE ─────────────────────────────── */
@media(max-width:820px){
  h1{font-size:20px}
  #status{min-width:unset;width:min(90vw,400px)}
  .game-wrap{flex-direction:column;align-items:center;gap:8px}
  .hand{
    width:calc(var(--cell)*9 + 18px);min-height:unset;
    padding:6px 8px;
  }
  .hand-label{margin-bottom:4px}
  .modal-box{padding:20px 16px;width:min(calc(100vw - 32px),400px)}
  #setup-modal{min-width:unset}
  #promo-dialog{min-width:unset}
  #winner-box{padding:28px 20px;max-width:calc(100vw - 32px)}
  #winner-box h2{font-size:24px}
  #winner-box p{font-size:15px}
  .controls{gap:8px}
  button{padding:8px 12px;font-size:13px}
}
/* ── WINNER ─────────────────────────────── */
#winner-overlay{
  display:none;position:fixed;inset:0;background:#00000099;z-index:200;
  align-items:center;justify-content:center;flex-direction:column;gap:24px;
}
#winner-overlay.show{display:flex}
#winner-box{
  background:#1e1e3e;border:2px solid var(--accent);border-radius:16px;
  padding:40px 56px;text-align:center;
  box-shadow:0 20px 80px rgba(0,0,0,.9);
}
#winner-box h2{font-size:32px;color:var(--accent);margin-bottom:12px}
#winner-box p{font-size:18px;color:var(--text);margin-bottom:24px}
#btn-minimize-winner{
  display:block;margin:0 auto 0;padding:4px 14px;font-size:12px;
  background:transparent;border:1px solid #ffffff33;color:var(--subtext);
  border-radius:12px;cursor:pointer;
}
#btn-minimize-winner:hover{background:#ffffff12;color:var(--text)}
/* ── WINNER MINI BAR ────────────────────── */
#winner-mini{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:#1e1e3e;border-top:2px solid var(--accent);
  padding:8px 16px;gap:10px;align-items:center;flex-wrap:wrap;
}
#winner-mini-text{flex:1;font-size:14px;color:var(--accent);font-weight:700}
#winner-mini button{padding:5px 14px;font-size:13px}
/* ── BOARD EDITOR ───────────────────────── */
#editor-modal{
  width:min(calc(100vw - 24px),600px);max-height:90vh;
  overflow-y:auto;padding:16px 20px;
}
#editor-modal h2{font-size:18px;color:var(--accent);margin-bottom:12px;text-align:center}
#editor-palette{
  display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;
  padding:8px;background:#12122a;border-radius:8px;
}
.palette-tile{
  width:38px;height:38px;background:var(--piece-bg);border:2px solid transparent;
  border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:var(--black-text);cursor:pointer;
  clip-path:polygon(50% 0%,97% 18%,100% 100%,0% 100%,3% 18%);
  transition:border-color .12s;
}
.palette-tile.white-piece{transform:rotate(180deg)}
.palette-tile.selected{border-color:var(--sel)!important;filter:brightness(1.2)}
.palette-tile.eraser{clip-path:none;border-radius:6px;background:#2a1a1a;border-color:#cc4444;color:#ff8888;font-size:18px}
#editor-board-wrap{display:flex;justify-content:center;margin-bottom:10px}
#editor-board{
  display:grid;grid-template-columns:repeat(9,var(--cell));
  grid-template-rows:repeat(9,var(--cell));
  background:var(--board);border:3px solid var(--border);
}
.editor-cell{
  width:var(--cell);height:var(--cell);border:1px solid rgba(92,51,23,.35);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.editor-cell:hover{background:var(--hover)}
.editor-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.palette-group-label{width:100%;font-size:10px;color:var(--subtext);margin-top:4px;letter-spacing:.08em}
</style>
</head>
<body>
<h1>Neo将棋</h1>
<div id="status">読み込み中…</div>
<div id="score-bar"></div>

<div class="game-wrap">
  <div class="hand" id="white-hand">
    <div class="hand-label">後手(白)　持ち駒</div>
    <div class="hand-pieces" id="white-pieces"></div>
  </div>

  <div class="board-outer">
    <div class="col-labels" id="col-labels"></div>
    <div class="board-row-wrap">
      <div id="board"></div>
      <div class="row-labels" id="row-labels"></div>
    </div>
  </div>

  <div class="hand" id="black-hand">
    <div class="hand-label">先手(黒)　持ち駒</div>
    <div class="hand-pieces" id="black-pieces"></div>
  </div>
</div>

<div class="controls">
  <button id="btn-new-game">新しいゲーム</button>
  <button id="btn-toggle-ai">AI: <span id="ai-toggle-label">ON</span></button>
  <button id="btn-toggle-labels">駒名: 1字</button>
  <button id="btn-declare-double" style="display:none">二手指し宣言</button>
</div>
<div id="replay-controls">
  <button id="btn-replay-start">|◀</button>
  <button id="btn-replay-prev">◀</button>
  <span id="replay-info"></span>
  <button id="btn-replay-next">▶</button>
  <button id="btn-replay-end">▶|</button>
  <button id="btn-replay-export">⬇ 棋譜保存</button>
  <button id="btn-replay-exit">✕</button>
</div>
<div id="eval-display">
  <div id="eval-label"></div>
  <canvas id="eval-graph"></canvas>
</div>

<!-- Shared modal overlay -->
<div class="modal-overlay" id="overlay"></div>

<!-- Promotion choice dialog -->
<div class="modal-box" id="promo-dialog">
  <p>成りますか？</p>
  <div class="preview">
    <span id="p-before"></span>
    <span class="p-promo" id="p-after"></span>
  </div>
  <div class="btns">
    <button id="btn-promo-yes">成る</button>
    <button id="btn-promo-no">成らない</button>
  </div>
</div>

<!-- Game setup modal -->
<div class="modal-overlay" id="setup-overlay"></div>
<div class="modal-box" id="setup-modal">
  <h2>ゲーム設定</h2>

  <div class="setup-section">
    <div class="setup-label">プレイヤー</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div>
        <div style="font-size:11px;color:var(--subtext);margin-bottom:4px;letter-spacing:.05em">先手 (黒)</div>
        <label class="setup-row" style="margin-bottom:2px">
          <input type="radio" name="black-player" value="human" checked>
          <div class="setup-row-text"><span class="setup-row-name">人間</span></div>
        </label>
        <label class="setup-row">
          <input type="radio" name="black-player" value="ai">
          <div class="setup-row-text"><span class="setup-row-name">AI</span></div>
        </label>
      </div>
      <div>
        <div style="font-size:11px;color:var(--subtext);margin-bottom:4px;letter-spacing:.05em">後手 (白)</div>
        <label class="setup-row" style="margin-bottom:2px">
          <input type="radio" name="white-player" value="human">
          <div class="setup-row-text"><span class="setup-row-name">人間</span></div>
        </label>
        <label class="setup-row">
          <input type="radio" name="white-player" value="ai" checked>
          <div class="setup-row-text"><span class="setup-row-name">AI</span></div>
        </label>
      </div>
    </div>
  </div>

  <div class="setup-section">
    <div class="setup-label">勝利条件</div>
    <label class="setup-row">
      <input type="radio" name="win-condition" value="standard" checked>
      <div class="setup-row-text">
        <span class="setup-row-name">標準（手詰まり負け）</span>
        <span class="setup-desc">合法手がなくなったら負け</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="radio" name="win-condition" value="reverse">
      <div class="setup-row-text">
        <span class="setup-row-name">逆将棋（手詰まり勝ち）</span>
        <span class="setup-desc">詰まされた方が勝ち</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="radio" name="win-condition" value="capture">
      <div class="setup-row-text">
        <span class="setup-row-name">駒取り将棋（20点先取）</span>
        <span class="setup-desc">歩1・香桂3・銀金5・角7・飛8点。先に20点取った方の勝ち</span>
      </div>
    </label>
  </div>

  <div class="setup-section">
    <div class="setup-label">駒の効果</div>
    <label class="setup-row">
      <input type="checkbox" id="opt-explosive">
      <div class="setup-row-text">
        <span class="setup-row-name">爆発将棋</span>
        <span class="setup-desc">移動後30%の確率で着地周囲1マスが爆発消滅</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="checkbox" id="opt-kamikaze">
      <div class="setup-row-text">
        <span class="setup-row-name">特攻将棋</span>
        <span class="setup-desc">敵駒を取ったとき取った駒も盤上から消滅する</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="checkbox" id="opt-exile">
      <div class="setup-row-text">
        <span class="setup-row-name">取り捨て将棋</span>
        <span class="setup-desc">取った駒は手駒に入らず消滅する</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="checkbox" id="opt-defection">
      <div class="setup-row-text">
        <span class="setup-row-name">降伏将棋</span>
        <span class="setup-desc">取られた駒が取った側の色に変わり元の位置に残る</span>
      </div>
    </label>
  </div>

  <div class="setup-section">
    <div class="setup-label">アクション</div>
    <label class="setup-row">
      <input type="checkbox" id="opt-double-move">
      <div class="setup-row-text">
        <span class="setup-row-name">二手指しモード</span>
        <span class="setup-desc">1局1回だけ先手が2手連続で指せる</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="checkbox" id="opt-berserker">
      <div class="setup-row-text">
        <span class="setup-row-name">必取将棋</span>
        <span class="setup-desc">取れる手があれば必ず取らなければならない</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="checkbox" id="opt-promote-anywhere">
      <div class="setup-row-text">
        <span class="setup-row-name">どこでも成り</span>
        <span class="setup-desc">成れる駒はどこからでも・どこへでも成れる</span>
      </div>
    </label>
  </div>

  <div class="setup-section">
    <div class="setup-label">盤面効果</div>
    <label class="setup-row">
      <input type="checkbox" id="opt-gravity">
      <div class="setup-row-text">
        <span class="setup-row-name">重力将棋</span>
        <span class="setup-desc">各手の後に全駒が下（後手陣方向）へ落ちる</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="checkbox" id="opt-shrink">
      <div class="setup-row-text">
        <span class="setup-row-name">縮小将棋</span>
        <span class="setup-desc">10手ごとに盤の外周1段が消え、駒は相手の手駒になる</span>
      </div>
    </label>
  </div>

  <div class="setup-section">
    <div class="setup-label">追加駒</div>
    <label class="setup-row">
      <input type="checkbox" id="opt-queen">
      <div class="setup-row-text">
        <span class="setup-row-name">クイーン（女）追加</span>
        <span class="setup-desc">全8方向スライダー。各プレイヤーの持ち駒に1枚追加</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="checkbox" id="opt-crazy-knight">
      <div class="setup-row-text">
        <span class="setup-row-name">全方向桂（跳）追加</span>
        <span class="setup-desc">チェスのナイト式・8方向全てに桂馬跳び。各プレイヤーに1枚</span>
      </div>
    </label>
    <!-- 忍者: 単調なゲームプレイにつき廃止。コードは plugins-extra.js に残存 -->
  </div>

  <div class="setup-section">
    <div class="setup-label">盤面</div>
    <div style="display:flex;gap:8px;padding:4px 8px">
      <button id="btn-open-editor" type="button" style="flex:1;font-size:12px;padding:6px">✏️ 盤面を編集</button>
      <button id="btn-clear-editor" type="button" style="font-size:12px;padding:6px;color:var(--subtext);background:transparent">✕ リセット</button>
    </div>
    <div id="custom-layout-badge" style="display:none;font-size:11px;color:#a6e3a1;padding:2px 8px">カスタム配置が設定されています</div>
  </div>

  <div class="setup-section">
    <div class="setup-label">AI レベル</div>
    <label class="setup-row">
      <input type="radio" name="ai-level" value="random">
      <div class="setup-row-text">
        <span class="setup-row-name">ランダム AI</span>
        <span class="setup-desc">合法手からランダム選択（取り手を60%優先）</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="radio" name="ai-level" value="level1" checked>
      <div class="setup-row-text">
        <span class="setup-row-name">1手読み AI</span>
        <span class="setup-desc">王手放置なし・取られる手を避ける・王手を優先</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="radio" name="ai-level" value="level2">
      <div class="setup-row-text">
        <span class="setup-row-name">2手読み AI（minimax）</span>
        <span class="setup-desc">α-β枝刈りで2手先まで読む。標準局面では速い</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="radio" name="ai-level" value="level3">
      <div class="setup-row-text">
        <span class="setup-row-name">3手読み AI（minimax）</span>
        <span class="setup-desc">3手先まで読む。終盤は遅くなる場合あり</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="radio" name="ai-level" value="timelimit">
      <div class="setup-row-text">
        <span class="setup-row-name">時間制限AI（iterative deepening）</span>
        <span class="setup-desc">設定秒数の間だけ読み続け、その時点の最善手を指す</span>
      </div>
    </label>
    <div id="timelimit-row" style="display:none;padding:4px 8px 4px 32px;align-items:center;gap:8px">
      <span style="font-size:13px;color:var(--subtext)">思考時間:</span>
      <input type="number" id="ai-time-sec" value="10" min="1" max="60"
        style="width:50px;background:#1a1a3a;border:1px solid #ffffff33;color:var(--text);
               border-radius:4px;padding:2px 6px;font-size:13px">
      <span style="font-size:13px;color:var(--subtext)">秒</span>
    </div>
  </div>

  <button id="btn-start-game">ゲーム開始</button>
</div>

<!-- Winner overlay -->
<div id="winner-overlay">
  <div id="winner-box">
    <h2 id="winner-title"></h2>
    <p id="winner-msg"></p>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button id="btn-view-kifu">棋譜を見る ▶</button>
      <button id="btn-minimize-winner">盤面を確認 ▼</button>
    </div>
    <br>
    <button id="btn-play-again">もう一度</button>
  </div>
</div>

<!-- Winner mini bar（最小化時）-->
<div id="winner-mini">
  <span id="winner-mini-text"></span>
  <button id="btn-winner-restore">▲ 結果を見る</button>
  <button id="btn-mini-kifu">棋譜</button>
  <button id="btn-winner-mini-again">もう一度</button>
</div>

<!-- Board Editor modal -->
<div class="modal-overlay" id="editor-overlay"></div>
<div class="modal-box" id="editor-modal">
  <h2>盤面編集</h2>
  <div id="editor-palette"></div>
  <div id="editor-board-wrap"><div id="editor-board"></div></div>
  <div class="editor-btns">
    <button id="btn-editor-standard">標準配置</button>
    <button id="btn-editor-clear">全消去</button>
    <button id="btn-editor-done">✓ 配置完了</button>
    <button id="btn-editor-cancel">キャンセル</button>
  </div>
</div>

<script type="module" src="ui.js?v=9"></script>
</body>
</html>
