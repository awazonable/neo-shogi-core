<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo将棋 PoC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--panel:#1a1a2e;--board:#d4a853;
  --border:#5c3317;--piece-bg:#faf8f0;--piece-border:#c0a870;
  --black-text:#1a1a1a;--promoted:#cc2200;
  --sel:#4caf50;--legal:#2196f3;--hover:#ffffff33;
  --text:#cdd6f4;--subtext:#a6adc8;--accent:#cba6f7;
}
body{
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:16px;gap:12px;
}
h1{font-size:28px;letter-spacing:.2em;color:var(--accent);text-shadow:0 0 20px #cba6f755}
#status{
  font-size:16px;padding:6px 24px;border-radius:20px;
  background:var(--panel);border:1px solid #ffffff22;color:var(--text);
  min-width:260px;text-align:center;letter-spacing:.05em;
}
.game-wrap{display:flex;align-items:flex-start;gap:16px}
/* ── HAND ───────────────────────────────── */
.hand{
  width:110px;background:var(--panel);border:1px solid #ffffff18;
  border-radius:10px;padding:10px 8px;min-height:200px;
}
.hand-label{font-size:11px;color:var(--subtext);margin-bottom:8px;text-align:center;letter-spacing:.1em}
.hand-pieces{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.hp{
  display:flex;align-items:center;gap:2px;padding:3px 6px;
  border-radius:6px;cursor:pointer;transition:background .15s;
  border:1px solid transparent;
}
.hp:hover{background:#ffffff12}
.hp.sel{background:#4caf5033;border-color:var(--sel)}
.hp-k{font-size:20px;line-height:1;color:var(--black-text)}
.hp-k.white{transform:rotate(180deg);display:inline-block}
.hp-n{font-size:11px;color:var(--subtext)}
.no-pieces{font-size:12px;color:var(--subtext);text-align:center;padding:8px 0}
/* ── BOARD ──────────────────────────────── */
.board-outer{display:flex;flex-direction:column;align-items:center;gap:4px}
.col-labels{display:flex;padding:0 0 0 18px}
.col-label{width:60px;text-align:center;font-size:12px;color:var(--subtext)}
.board-row-wrap{display:flex;align-items:stretch}
.row-labels{display:flex;flex-direction:column;padding-top:0}
.row-label{height:60px;width:18px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--subtext)}
#board{
  display:grid;grid-template-columns:repeat(9,60px);grid-template-rows:repeat(9,60px);
  background:var(--board);border:3px solid var(--border);
  box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 0 40px rgba(0,0,0,.1);
}
.cell{
  width:60px;height:60px;border:1px solid rgba(92,51,23,.35);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background-color .1s;position:relative;
}
.cell:hover{background:var(--hover)}
.cell.sel{background:rgba(76,175,80,.55)}
.cell.sel:hover{background:rgba(76,175,80,.75)}
.cell.legal{background:rgba(33,150,243,.42)}
.cell.legal:hover{background:rgba(33,150,243,.72)}
.cell.last-from{background:rgba(255,200,50,.25)}
.cell.last-to{background:rgba(255,200,50,.4)}
/* ── PIECE ──────────────────────────────── */
.piece{
  width:52px;height:52px;background:var(--piece-bg);
  border:1px solid var(--piece-border);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;color:var(--black-text);
  box-shadow:1px 2px 3px rgba(0,0,0,.35);
  pointer-events:none;user-select:none;
  clip-path:polygon(50% 0%,97% 18%,100% 100%,0% 100%,3% 18%);
  transition:filter .1s;
}
.piece.white{transform:rotate(180deg)}
.piece.promo{color:var(--promoted)}
.cell.sel .piece,.cell:hover .piece{filter:brightness(1.1)}
/* ── CONTROLS ───────────────────────────── */
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
button{
  padding:8px 20px;border-radius:8px;border:1px solid #ffffff33;
  background:#2a2a4e;color:var(--text);cursor:pointer;font-size:14px;
  transition:background .15s;letter-spacing:.05em;
}
button:hover{background:#3a3a6e}
#btn-declare-double{background:#3a2a0e;border-color:#c8943a;color:#f0c060}
#btn-declare-double:hover{background:#5a3a1e}
/* ── MODALS (shared) ────────────────────── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:#00000088;z-index:98;
}
.modal-box{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#1e1e3e;border:2px solid var(--accent);border-radius:12px;
  padding:28px 36px;z-index:99;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
}
/* ── PROMO DIALOG ───────────────────────── */
#promo-dialog{text-align:center;min-width:240px}
#promo-dialog p{font-size:18px;margin-bottom:20px;color:var(--text)}
#promo-dialog .preview{font-size:40px;margin-bottom:16px;display:flex;justify-content:center;gap:20px}
#promo-dialog .preview span{
  padding:8px 12px;background:var(--piece-bg);border-radius:4px;
  color:var(--black-text);border:1px solid var(--piece-border);
  clip-path:polygon(50% 0%,97% 18%,100% 100%,0% 100%,3% 18%);
  width:56px;height:56px;display:flex;align-items:center;justify-content:center;
}
#promo-dialog .preview .p-promo{color:var(--promoted)}
#promo-dialog .btns{display:flex;gap:12px;justify-content:center}
#promo-dialog .btns button{min-width:90px;font-size:15px}
/* ── SETUP MODAL ────────────────────────── */
#setup-modal{min-width:320px}
#setup-modal h2{font-size:20px;color:var(--accent);margin-bottom:18px;text-align:center;letter-spacing:.1em}
.setup-section{margin-bottom:16px}
.setup-label{font-size:11px;color:var(--subtext);letter-spacing:.1em;margin-bottom:8px;text-transform:uppercase}
.setup-row{
  display:flex;align-items:flex-start;gap:10px;padding:7px 8px;
  border-radius:6px;cursor:pointer;transition:background .12s;
  border:1px solid transparent;margin-bottom:4px;
}
.setup-row:hover{background:#ffffff0a}
.setup-row input[type="checkbox"],.setup-row input[type="radio"]{
  margin-top:3px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;
}
.setup-row input[disabled]{opacity:.4;cursor:not-allowed}
.setup-row-text{display:flex;flex-direction:column}
.setup-row-name{font-size:14px;color:var(--text)}
.setup-desc{font-size:11px;color:var(--subtext);margin-top:2px}
#btn-start-game{
  width:100%;margin-top:8px;font-size:16px;padding:10px;
  background:var(--accent);color:#0f0f1a;border:none;font-weight:700;
  border-radius:8px;letter-spacing:.05em;
}
#btn-start-game:hover{background:#b892e0}
/* ── WINNER ─────────────────────────────── */
#winner-overlay{
  display:none;position:fixed;inset:0;background:#00000099;z-index:200;
  align-items:center;justify-content:center;flex-direction:column;gap:24px;
}
#winner-overlay.show{display:flex}
#winner-box{
  background:#1e1e3e;border:2px solid var(--accent);border-radius:16px;
  padding:40px 56px;text-align:center;
  box-shadow:0 20px 80px rgba(0,0,0,.9);
}
#winner-box h2{font-size:32px;color:var(--accent);margin-bottom:12px}
#winner-box p{font-size:18px;color:var(--text);margin-bottom:24px}
</style>
</head>
<body>
<h1>Neo将棋</h1>
<div id="status">読み込み中…</div>

<div class="game-wrap">
  <div class="hand" id="white-hand">
    <div class="hand-label">後手(白)　持ち駒</div>
    <div class="hand-pieces" id="white-pieces"></div>
  </div>

  <div class="board-outer">
    <div class="col-labels" id="col-labels"></div>
    <div class="board-row-wrap">
      <div id="board"></div>
      <div class="row-labels" id="row-labels"></div>
    </div>
  </div>

  <div class="hand" id="black-hand">
    <div class="hand-label">先手(黒)　持ち駒</div>
    <div class="hand-pieces" id="black-pieces"></div>
  </div>
</div>

<div class="controls">
  <button id="btn-new-game">新しいゲーム</button>
  <button id="btn-toggle-ai">AI: <span id="ai-toggle-label">ON</span></button>
  <button id="btn-declare-double" style="display:none">二手指し宣言</button>
</div>

<!-- Shared modal overlay -->
<div class="modal-overlay" id="overlay"></div>

<!-- Promotion choice dialog -->
<div class="modal-box" id="promo-dialog">
  <p>成りますか？</p>
  <div class="preview">
    <span id="p-before"></span>
    <span class="p-promo" id="p-after"></span>
  </div>
  <div class="btns">
    <button id="btn-promo-yes">成る</button>
    <button id="btn-promo-no">成らない</button>
  </div>
</div>

<!-- Game setup modal -->
<div class="modal-overlay" id="setup-overlay"></div>
<div class="modal-box" id="setup-modal">
  <h2>ゲーム設定</h2>

  <div class="setup-section">
    <div class="setup-label">ルール</div>
    <label class="setup-row">
      <input type="checkbox" checked disabled>
      <div class="setup-row-text">
        <span class="setup-row-name">標準将棋ルール（必須）</span>
        <span class="setup-desc">9×9盤・8駒種・王手放置禁止</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="checkbox" id="opt-earthquake">
      <div class="setup-row-text">
        <span class="setup-row-name">地震モード</span>
        <span class="setup-desc">毎ターン後、全駒が同方向に1マスずれる（盤外は消滅）</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="checkbox" id="opt-double-move">
      <div class="setup-row-text">
        <span class="setup-row-name">二手指しモード</span>
        <span class="setup-desc">1局1回だけ先手が2手連続で指せる</span>
      </div>
    </label>
  </div>

  <div class="setup-section">
    <div class="setup-label">AI レベル</div>
    <label class="setup-row">
      <input type="radio" name="ai-level" value="random">
      <div class="setup-row-text">
        <span class="setup-row-name">ランダム AI</span>
        <span class="setup-desc">合法手からランダム選択（取り手を60%優先）</span>
      </div>
    </label>
    <label class="setup-row">
      <input type="radio" name="ai-level" value="level1" checked>
      <div class="setup-row-text">
        <span class="setup-row-name">1手読み AI</span>
        <span class="setup-desc">王手放置なし・取られる手を避ける・王手を優先</span>
      </div>
    </label>
  </div>

  <button id="btn-start-game">ゲーム開始</button>
</div>

<!-- Winner overlay -->
<div id="winner-overlay">
  <div id="winner-box">
    <h2 id="winner-title"></h2>
    <p id="winner-msg"></p>
    <button id="btn-play-again">もう一度</button>
  </div>
</div>

<script type="module" src="ui.js"></script>
</body>
</html>
